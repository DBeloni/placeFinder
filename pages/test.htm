<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Restaurantes Próximos</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        h2 { 
            margin-top: 0; 
            color: #333; 
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            padding: 12px 24px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { 
            background-color: #218838; 
}

        /* Layout em duas colunas */
        .app-container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0; /* Permite o scroll interno na sidebar */
        }

        .sidebar {
            width: 350px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #map {
            flex: 1;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .placeholder-text {
            color: #888; 
            text-align: center;
        }

        /* Estilo dos Cards de Restaurante */
        .restaurant-card {
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .restaurant-card:hover {
            transform: translateY(-2px);
            border-color: #28a745;
            background-color: #f9fff9;
        }

        .restaurant-name { 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 5px; 
        }

        .restaurant-distance { 
            color: #28a745; 
            font-size: 14px; 
            font-weight: bold; 
        }

        .restaurant-info { 
            color: #666; 
            font-size: 12px; 
            margin-top: 5px; 
        }
    </style>
</head>
<body>

    <h2>🍔 Buscador de Restaurantes Próximos</h2>
    
    <div class="search-box">
        <input type="text" id="endereco" placeholder="Digite seu CEP ou Endereço (Ex: Centro, Canoas ou Av. Paulista, SP)">
        <button id="btnBuscar">Buscar Restaurantes</button>
    </div>

    <div class="app-container">
        <div class="sidebar" id="listaRestaurantes">
            <p class="placeholder-text">Digite um endereço para ver os restaurantes próximos.</p>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Inicializa o mapa focado no Brasil
        const map = L.map('map').setView([-14.2350, -51.9253], 4);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Grupo para gerenciar os marcadores (facilita limpar o mapa antes de uma nova busca)
        const camadaMarcadores = L.layerGroup().addTo(map);

        // 2. Ouvintes de Eventos (Event Listeners)
        document.getElementById('btnBuscar').addEventListener('click', buscarProximos);

        document.getElementById('endereco').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                buscarProximos();
            }
        });

        // 3. Função Principal
        async function buscarProximos() {
            const termoBusca = document.getElementById('endereco').value;
            const listaDiv = document.getElementById('listaRestaurantes');
            
            if (!termoBusca) return alert("Por favor, digite um endereço ou CEP!");
            
            listaDiv.innerHTML = "<p style='text-align:center;'>Buscando localização...</p>";
            camadaMarcadores.clearLayers();

            try {
                // PASSO 1: Encontrar as coordenadas do endereço (Nominatim API)
                const urlGeo = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(termoBusca)}`;
                const resGeo = await fetch(urlGeo);
                const dadosGeo = await resGeo.json();

                if (dadosGeo.length === 0) {
                    listaDiv.innerHTML = "<p class='placeholder-text'>Endereço não encontrado.</p>";
                    return;
                }

                const latUsuario = parseFloat(dadosGeo[0].lat);
                const lonUsuario = parseFloat(dadosGeo[0].lon);

                // Move o mapa para a localização do usuário
                map.setView([latUsuario, lonUsuario], 15);
                
                // Marcador azul do usuário
                L.marker([latUsuario, lonUsuario]).addTo(camadaMarcadores)
                    .bindPopup("<b>Você está aqui!</b>").openPopup();

                listaDiv.innerHTML = "<p style='text-align:center;'>Procurando locais próximos...</p>";

                // PASSO 2: Buscar variados locais de alimentação em um raio de 1.5km (Overpass API)
                const raio = 1500; 
                const queryOverpass = `
                    [out:json];
                    (
                      node["amenity"~"restaurant|fast_food|cafe|bar"](around:${raio},${latUsuario},${lonUsuario});
                      way["amenity"~"restaurant|fast_food|cafe|bar"](around:${raio},${latUsuario},${lonUsuario});
                    );
                    out center;
                `;
                
                const urlOverpass = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(queryOverpass);
                const resOverpass = await fetch(urlOverpass);
                const dadosOverpass = await resOverpass.json();

                const restaurantes = dadosOverpass.elements;

                if (restaurantes.length === 0) {
                    listaDiv.innerHTML = "<p class='placeholder-text'>Nenhum restaurante ou lanchonete encontrado neste raio.</p>";
                    return;
                }

                // PASSO 3: Mapear os dados e calcular as distâncias reais
                const listaProcessada = restaurantes.map(rest => {
                    const latRest = rest.lat || (rest.center && rest.center.lat);
                    const lonRest = rest.lon || (rest.center && rest.center.lon);
                    const nome = rest.tags.name || "Estabelecimento Sem Nome";
                    let cozinha = rest.tags.cuisine || rest.tags.amenity || "Não informada";
                    
                    // Tradução simples estética de categorias do OpenStreetMap
                    if(cozinha === "restaurant") cozinha = "Restaurante";
                    if(cozinha === "fast_food") cozinha = "Fast-Food / Lanchonete";
                    if(cozinha === "cafe") cozinha = "Cafeteria";
                    if(cozinha === "bar") cozinha = "Bar / Pub";

                    // Calcula distância usando ferramenta nativa do Leaflet
                    const pontoUsuario = L.latLng(latUsuario, lonUsuario);
                    const pontoRest = L.latLng(latRest, lonRest);
                    const distancia = pontoUsuario.distanceTo(pontoRest); 

                    return { nome, cozinha, lat: latRest, lon: lonRest, distancia };
                });

                // PASSO 4: Ordenar do mais próximo para o mais distante
                listaProcessada.sort((a, b) => a.distancia - b.distancia);

                // PASSO 5: Renderizar na tela
                listaDiv.innerHTML = ""; // Limpa texto de carregamento

                listaProcessada.forEach((rest, index) => {
                    const textoDistancia = rest.distancia > 1000 
                        ? `${(rest.distancia / 1000).toFixed(1)} km` 
                        : `${Math.round(rest.distancia)} metros`;

                    // Cria o elemento do card
                    const card = document.createElement('div');
                    card.className = 'restaurant-card';
                    card.innerHTML = `
                        <div class="restaurant-name">${index + 1}. ${rest.nome}</div>
                        <div class="restaurant-distance">📍 A ${textoDistancia} de você</div>
                        <div class="restaurant-info">Tipo: ${rest.cozinha}</div>
                    `;

                    // Cria o pino no mapa
                    const marcador = L.marker([rest.lat, rest.lon]).addTo(camadaMarcadores)
                        .bindPopup(`<b>${rest.nome}</b><br>Tipo: ${rest.cozinha}<br>Distância: ${textoDistancia}`);

                    // Evento: Clicar no card foca o mapa no restaurante
                    card.addEventListener('click', () => {
                        map.setView([rest.lat, rest.lon], 17);
                        marcador.openPopup();
                    });

                    listaDiv.appendChild(card);
                });

            } catch (erro) {
                console.error(erro);
                listaDiv.innerHTML = "<p class='placeholder-text'>Erro ao processar dados. Tente novamente.</p>";
            }
        }
    </script>
</body>
</html>
