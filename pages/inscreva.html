<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>

    <link rel="stylesheet" href="/style/main.css">

    <script src="/script/site-header.js" defer></script>
    <script src="/script/site-footer.js" defer></script>
</head>
<body>
    <site-header></site-header>

    <main>
    
        

    <form id="cadastro">
        <h1>Criar Conta</h1>
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Seu melhor email" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Sua senha" required>
            <button type="submit" id="cdst">Registrar</button>
    </form>

    </main>

    
    <site-header id="escondido"></site-header>
</body>
</html>
