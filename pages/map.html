<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="/style/css/main.css">

    <script src="/script/components/site-header.js" defer></script>
    <script src="/script/components/site-footer.js" defer></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script src="/script/cep.js" type="module"></script>

</head>

<body>
    <site-header></site-header>

    <main id="paginaMapaMain">

        <h1>Buscador</h1>

        <label for="cep">Digite o CEP do local:</label>
        <input type="number" name="cep" id="cep" placeholder="00000000" required>

        <label for="servico">Escolha o serviço para buscar:</label>
        <select id="categoria-servico" required>
            <option value="" disabled selected>O que você procura por perto?</option>
            <option value="academia">Academia</option>
            <option value="supermercado">Supermercado</option>
            <option value="posto">Posto de Gasolina</option>
            <option value="hospital">Hospital</option>
            <option value="restaurante">Restaurante</option>
            <option value="farmacia">Farmácia</option>
            <option value="igreja">Igreja</option>
        </select>

        <label for="raio">Digite o raio de onde os serviços podem estar do CEP:</label>
        <input type="number" name="raio" id="raio" placeholder="Raio em Km" required>

        <button type="submit">Buscar</button>

        <div id="map"></div>

        <p>O PlaceFinder não é humano, ele pode cometer erros!</p>

    </main>

    <site-footer></site-footer>
</body>

</html>
