<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="/style/main.css">


    <script src="/script/components/site-header.js" defer></script>
    <script src="/script/components/site-footer.js" defer></script>
    <script src="/script/components/card-local.js" defer></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script src="/script/cep.js" type="module"></script>


</head>

<body>
    <site-header></site-header>

    <main id="paginaMapaMain">

        <div class="forms-top-bar">
            <h1>Buscador</h1>

            <form id="form-busca">
                <div class="input-group">
                    <label for="cep">Digite o CEP do local:</label>
                    <input type="text" id="cep" placeholder="00000000">
                </div>

                <div class="input-group">
                    <label for="categoria-servico">Escolha o serviço para buscar:</label>
                    <select id="categoria-servico">
                        <option value="">O que você procura por perto?</option>
                        <option value="academia">Academia</option>
                        <option value="supermercado">Supermercado</option>
                        <option value="posto">Posto de Combustível</option>
                        <option value="hospital">Hospital</option>
                        <option value="restaurante">Restaurante</option>
                        <option value="farmacia">Farmácia</option>
                        <option value="igreja">Igreja</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="raio">Digite o raio de onde os serviços podem estar do CEP:</label>
                    <input type="text" id="raio" placeholder="Raio em Km">
                </div>

                <button type="submit" id="btn-buscar">Buscar</button>
            </form>
        </div>

        <aside class="resultados-sidebar">
            <h3>Resultados da pesquisa:</h3>

            <div class="lista-locais">
            </div>

            <p class="ai-warning">O PlaceFinder não é humano, ele pode cometer erros!</p>
        </aside>

        <div id="map"></div>

    </main>

    <site-footer></site-footer>
</body>

</html>
