<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/style/main.css">

    <script type="module" src="/script/auth-main.js"></script>
</head>
<body class="auth-body">

    <header class="auth-header">
        <a href="/pages/index.html" class="auth-logo">PlaceFinder</a>
    </header>

    <main class="auth-screen">
        <div class="auth-card">
            <form id="cadastro">
                <h1 class="auth-title">Sign Up</h1>
                <p class="auth-subtitle">Get started with a new experience.</p>
                
                <div class="input-group-custom">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group-custom">
                    <label for="senha">Password</label>
                    <input type="password" id="senha" placeholder="Create a password" required>
                </div>

                <div class="input-group-custom">
                    <label for="confirmar-senha">Confirm Password</label>
                    <input type="password" id="confirmar-senha" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" id="cdst">Register</button>
            </form>
        </div>
    </main>

    <footer class="auth-footer">
        <p>&copy; 2026 PlaceFinder. All rights reserved.</p>
    </footer>

</body>
</html>
