<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaceFinder</title>

    <link rel="stylesheet" href="/style/main.css">
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">

    <script type="module" src="/script/auth-main.js"></script>
    
    <script type="module">
        import { aplicarTraducao } from '/script/utils/i18n.js';
        aplicarTraducao();
    </script>
</head>

<body class="auth-body">

    <header class="auth-header">
        <a href="index.html" class="auth-logo">PlaceFinder</a>
    </header>

    <main class="auth-screen">
        <div class="auth-card">
            <form id="cadastro">
                <h1 class="auth-title" data-i18n="signup_title">Sign Up</h1>
                <p class="auth-subtitle" data-i18n="signup_subtitle">Get started with a new experience.</p>
                
                <div class="input-group-custom">
                    <label for="email" data-i18n="label_email">E-mail</label>
                    <input type="email" id="email" data-i18n="placeholder_email" placeholder="Enter your email" required>
                </div>

                <div class="input-group-custom">
                    <label for="senha" data-i18n="label_password">Password</label>
                    <input type="password" id="senha" data-i18n="placeholder_password" placeholder="Create a password" required>
                </div>

                <div class="input-group-custom">
                    <label for="confirmar-senha" data-i18n="label_confirm_password">Confirm Password</label>
                    <input type="password" id="confirmar-senha" data-i18n="placeholder_confirm_password" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" id="cdst" data-i18n="btn_register">Register</button>
            </form>
        </div>
    </main>

    <footer class="auth-footer">
        <p>&copy; 2026 PlaceFinder. All rights reserved.</p>
    </footer>

</body>
</html>
