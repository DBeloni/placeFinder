<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaceFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style/main.css">
    <script src="/script/components/site-header.js" defer></script>
    <script src="/script/components/site-footer.js" defer></script>
</head>

<body>
    <site-header></site-header>

    <main class="principal">
        <section class="hero container my-5 py-5">
            <div class="row align-items-center g-5">
                <div class="col-12 col-lg-6">
                    <h1 class="display-5 fw-bold lh-1 mb-3">Find the perfect places around you</h1>
                    <p class="lead mb-4">Quickly discover gyms, supermarkets, gas stations, and more using your zip
                        code.</p>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                        <a href="login.html" class="btn btn-login px-4 me-md-2 fw-bold">Login</a>
                        <a href="signIn.html" class="btn btn-signup px-4">Sign In</a>
                    </div>
                </div>
                <div class="col-12 col-lg-6">
                    <div style="width: 100%; height: 350px; background-color: var(--color5); border: 3px dashed var(--color2); border-radius: var(--bordaRadius);"
                        class="d-flex align-items-center justify-content-center">
                        <span style="color: var(--color2); font-weight: bold; opacity: 0.6;">[ Application Preview Image
                            ]</span>
                    </div>
                </div>
            </div>
        </section>
        <section class="sobre"></section>
    </main>

    <site-footer></site-footer>
</body>

</html>
