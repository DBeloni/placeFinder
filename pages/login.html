<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaceFinder</title>

    <link rel="stylesheet" href="/style/main.css">

    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">

    <script type="module">
        import { aplicarTraducao } from '/script/utils/i18n.js';
        aplicarTraducao();
    </script>

    <script type="module" src="/script/login-main.js"></script>
</head>

<body class="auth-body">

    <header class="auth-header">
        <a href="/index.html" class="auth-logo">PlaceFinder</a>
    </header>

    <main class="login-page-clean">
        <form id="login-form">
            <h1 class="auth-title">Sign In</h1>
            <p class="auth-subtitle">Welcome back! Please enter your details.</p>

            <div class="input-group-custom">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group-custom">
                <label for="senha">Password</label>
                <input type="password" id="senha" placeholder="Enter your password" required>
            </div>

            <button type="submit" id="cdst">Sign In</button>
        </form>
    </main>

    <footer class="auth-footer">
        <p>&copy; 2026 PlaceFinder. All rights reserved.</p>
    </footer>

</body>

</html>
